name: Destroy Lab

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Digite DESTROY para confirmar a remocao da infraestrutura do banco no lab"
        required: true
        type: string
      cleanup_orphans_only:
        description: "Executa somente o cleanup de recursos orfaos quando nao existe state remoto"
        required: true
        default: false
        type: boolean
      skip_final_db_snapshot:
        description: "Pula o snapshot final do RDS"
        required: true
        default: false
        type: boolean

concurrency:
  group: lab-infra-db
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  destroy:
    if: inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_ARGS: -no-color
      TERRAFORM_ACTION: destroy
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      SHARED_INFRA_NAME: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_IDENTIFIER: ${{ vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/database/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      FINAL_SNAPSHOT_IDENTIFIER: ${{ vars.DB_FINAL_SNAPSHOT_IDENTIFIER || format('{0}-final', vars.DB_IDENTIFIER || 'oficina-postgres-lab') }}
      SKIP_FINAL_SNAPSHOT: ${{ inputs.skip_final_db_snapshot }}
      TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_shared_infra_name: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_VAR_eks_cluster_name: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_VAR_db_identifier: ${{ vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      TF_VAR_deletion_protection: "false"
      TF_VAR_skip_final_snapshot: ${{ inputs.skip_final_db_snapshot }}
      TF_VAR_final_snapshot_identifier: ${{ vars.DB_FINAL_SNAPSHOT_IDENTIFIER || format('{0}-final', vars.DB_IDENTIFIER || 'oficina-postgres-lab') }}
      TF_VAR_allowed_cidr_blocks: ${{ vars.DB_ALLOWED_CIDR_BLOCKS }}
      TF_VAR_allowed_security_group_ids: ${{ vars.DB_ALLOWED_SECURITY_GROUP_IDS }}
      TF_VAR_vpc_id: ${{ vars.DB_VPC_ID }}
      TF_VAR_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
      TF_VAR_create_network_if_missing: ${{ vars.DB_CREATE_NETWORK_IF_MISSING }}
      TF_VAR_network_vpc_cidr: ${{ vars.DB_NETWORK_VPC_CIDR }}
      TF_VAR_azs: ${{ vars.DB_AZS }}
      TF_VAR_public_subnet_cidrs: ${{ vars.DB_PUBLIC_SUBNET_CIDRS }}
      TF_VAR_terraform_shared_data_bucket_name: ${{ vars.TERRAFORM_SHARED_DATA_BUCKET_NAME || vars.TF_STATE_BUCKET }}
      TF_VAR_terraform_shared_data_bucket_force_destroy: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        if: inputs.cleanup_orphans_only == false
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            DB_IDENTIFIER
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub (organization, repository ou environment): ${name}" >&2
              exit 1
            fi
          done

          if [[ "${SKIP_FINAL_SNAPSHOT}" != "true" && -z "${FINAL_SNAPSHOT_IDENTIFIER:-}" ]]; then
            echo "FINAL_SNAPSHOT_IDENTIFIER e obrigatoria quando skip_final_db_snapshot=false" >&2
            exit 1
          fi

          aws sts get-caller-identity >/dev/null

      - name: Cleanup orphan database resources
        if: inputs.cleanup_orphans_only == true
        shell: bash
        run: bash ./scripts/actions/cleanup-orphan-db.sh

      - name: Destroy lab database infrastructure
        if: inputs.cleanup_orphans_only == false
        id: destroy_lab
        continue-on-error: true
        shell: bash
        run: bash ./scripts/actions/ci-terraform.sh

      - name: Retry destroy lab database infrastructure
        if: inputs.cleanup_orphans_only == false && steps.destroy_lab.outcome == 'failure'
        shell: bash
        run: bash ./scripts/actions/ci-terraform.sh
