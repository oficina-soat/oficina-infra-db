name: Deploy Lab

on:
  push:
  workflow_dispatch:

concurrency:
  group: lab-infra
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref_protected
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      SHARED_INFRA_NAME: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/database/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      BOOTSTRAP_APP_USER: ${{ vars.BOOTSTRAP_APP_USER || 'false' }}
      APP_DB_USER: ${{ vars.APP_DB_USER || 'oficina_app' }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_ALLOW_SCHEMA_CHANGES: ${{ vars.APP_DB_ALLOW_SCHEMA_CHANGES || 'true' }}
      STORE_IN_SECRETS_MANAGER: ${{ vars.STORE_APP_DB_SECRET_IN_SECRETS_MANAGER || 'false' }}
      APP_SECRET_NAME: ${{ vars.APP_DB_SECRET_NAME }}
      APP_SECRET_KMS_KEY_ID: ${{ vars.APP_DB_SECRET_KMS_KEY_ID }}
      APPLY_K8S_SECRET: ${{ vars.APPLY_K8S_SECRET || 'false' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
      K8S_SECRET_NAME: ${{ vars.K8S_SECRET_NAME || 'oficina-database-env' }}
      RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS || 'true' }}
      FLYWAY_DOCKER_IMAGE: ${{ vars.FLYWAY_DOCKER_IMAGE || 'redgate/flyway:12.4-alpine' }}
      FLYWAY_BASELINE_ON_MIGRATE: ${{ vars.FLYWAY_BASELINE_ON_MIGRATE || 'true' }}
      TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_shared_infra_name: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_VAR_eks_cluster_name: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_VAR_db_identifier: ${{ vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      TF_VAR_db_name: ${{ vars.DB_NAME || 'app' }}
      TF_VAR_db_username: ${{ vars.DB_USERNAME || 'oficina_master' }}
      TF_VAR_instance_class: ${{ vars.DB_INSTANCE_CLASS || 'db.t4g.micro' }}
      TF_VAR_engine_version: ${{ vars.DB_ENGINE_VERSION || '16' }}
      TF_VAR_allocated_storage: ${{ vars.DB_ALLOCATED_STORAGE || '20' }}
      TF_VAR_max_allocated_storage: ${{ vars.DB_MAX_ALLOCATED_STORAGE || '40' }}
      TF_VAR_publicly_accessible: ${{ vars.DB_PUBLICLY_ACCESSIBLE || 'true' }}
      TF_VAR_deletion_protection: ${{ vars.DB_DELETION_PROTECTION || 'true' }}
      TF_VAR_final_snapshot_identifier: ${{ vars.DB_FINAL_SNAPSHOT_IDENTIFIER || format('{0}-final', vars.DB_IDENTIFIER || 'oficina-postgres-lab') }}
      TF_VAR_allowed_cidr_blocks: ${{ vars.DB_ALLOWED_CIDR_BLOCKS }}
      TF_VAR_allowed_security_group_ids: ${{ vars.DB_ALLOWED_SECURITY_GROUP_IDS }}
      TF_VAR_vpc_id: ${{ vars.DB_VPC_ID }}
      TF_VAR_subnet_ids: ${{ vars.DB_SUBNET_IDS }}
      TF_VAR_create_network_if_missing: ${{ vars.DB_CREATE_NETWORK_IF_MISSING || 'true' }}
      TF_VAR_network_vpc_cidr: ${{ vars.DB_NETWORK_VPC_CIDR || '10.0.0.0/16' }}
      TF_VAR_azs: ${{ vars.DB_AZS }}
      TF_VAR_public_subnet_cidrs: ${{ vars.DB_PUBLIC_SUBNET_CIDRS }}
      TF_VAR_create_terraform_shared_data_bucket: ${{ vars.CREATE_TERRAFORM_SHARED_DATA_BUCKET || 'true' }}
      TF_VAR_terraform_shared_data_bucket_name: ${{ vars.TERRAFORM_SHARED_DATA_BUCKET_NAME }}
      TF_VAR_terraform_shared_data_bucket_force_destroy: ${{ vars.TERRAFORM_SHARED_DATA_BUCKET_FORCE_DESTROY || 'false' }}
      TF_VAR_create_alarms: ${{ vars.DB_CREATE_ALARMS || 'false' }}
      TF_VAR_enabled_cloudwatch_logs_exports: ${{ vars.DB_ENABLED_CLOUDWATCH_LOGS_EXPORTS }}
      TF_VAR_monitoring_interval: ${{ vars.DB_MONITORING_INTERVAL || '0' }}
      TF_VAR_performance_insights_enabled: ${{ vars.DB_PERFORMANCE_INSIGHTS_ENABLED || 'false' }}
      TF_VAR_tags: ${{ vars.DB_TAGS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        if: env.APPLY_K8S_SECRET == 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            TF_VAR_db_identifier
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub: ${name}" >&2
              exit 1
            fi
          done

          if [[ "${BOOTSTRAP_APP_USER}" == "true" && "${STORE_IN_SECRETS_MANAGER}" == "true" && -z "${APP_SECRET_NAME:-}" ]]; then
            echo "APP_SECRET_NAME e obrigatoria quando BOOTSTRAP_APP_USER=true e STORE_IN_SECRETS_MANAGER=true" >&2
            exit 1
          fi

          if [[ "${APPLY_K8S_SECRET}" == "true" && -z "${EKS_CLUSTER_NAME:-}" ]]; then
            echo "EKS_CLUSTER_NAME e obrigatoria quando APPLY_K8S_SECRET=true" >&2
            exit 1
          fi

          aws sts get-caller-identity >/dev/null

      - name: Deploy infrastructure and optional database secret
        shell: bash
        run: bash ./scripts/ci-deploy.sh
