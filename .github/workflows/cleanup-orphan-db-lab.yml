name: Cleanup Orphan DB Lab Infra

on:
  workflow_dispatch:
    inputs:
      confirm_cleanup:
        description: "Digite CLEANUP para confirmar a remocao da infraestrutura orfa do banco"
        required: true
        type: string

concurrency:
  group: lab-infra
  cancel-in-progress: false

jobs:
  cleanup:
    if: inputs.confirm_cleanup == 'CLEANUP'
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      SHARED_INFRA_NAME: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_IDENTIFIER: ${{ vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/database/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      FINAL_SNAPSHOT_IDENTIFIER: ${{ vars.DB_ORPHAN_FINAL_SNAPSHOT_IDENTIFIER || format('{0}-orphan-cleanup', vars.DB_IDENTIFIER || 'oficina-postgres-lab') }}
      SKIP_FINAL_SNAPSHOT: ${{ vars.DB_ORPHAN_SKIP_FINAL_SNAPSHOT || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            DB_IDENTIFIER
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub: ${name}" >&2
              exit 1
            fi
          done

          aws sts get-caller-identity >/dev/null

      - name: Cleanup orphan database resources
        shell: bash
        run: bash ./scripts/cleanup-orphan-db.sh
